<div class="page-enter max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl lg:text-3xl font-bold text-navy-900">All Applications</h1>
    <p class="text-slate-500 mt-1">Review and manage all loan applications</p>
  </div>

  <!-- Filters -->
  <mat-card class="!rounded-2xl shadow-sm border border-slate-100 mb-6">
    <mat-card-content class="!p-5">
      <div class="flex flex-col gap-4">
        <!-- Search -->
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Search applications</mat-label>
          <input matInput [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)"
                 placeholder="Search by customer name, email, type...">
          <mat-icon matSuffix class="text-slate-400">search</mat-icon>
        </mat-form-field>

        <!-- Status Filter Chips -->
        <div class="flex flex-wrap gap-2">
          <button *ngFor="let filter of statusFilters"
                  (click)="selectedStatus.set(filter.value); pageIndex.set(0)"
                  class="px-3 py-1.5 rounded-full text-sm font-medium border transition-all"
                  [class.bg-navy]="selectedStatus() === filter.value && !filter.color"
                  [class.text-white]="selectedStatus() === filter.value && !filter.color"
                  [class.border-navy]="selectedStatus() === filter.value && !filter.color"
                  [class.bg-slate-100]="selectedStatus() !== filter.value || filter.color"
                  [class.text-slate-600]="selectedStatus() !== filter.value"
                  [class.border-transparent]="selectedStatus() !== filter.value">
            {{ filter.label }}
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Table -->
  <mat-card class="!rounded-2xl shadow-sm border border-slate-100">
    <mat-card-content class="!p-0">
      <!-- Loading -->
      <div *ngIf="loading()" class="p-6">
        <app-loading-skeleton [count]="8"></app-loading-skeleton>
      </div>

      <!-- Empty -->
      <app-empty-state
        *ngIf="!loading() && filteredApplications().length === 0"
        icon="📋"
        title="No applications found"
        message="No loan applications match your filters.">
      </app-empty-state>

      <!-- Table -->
      <div *ngIf="!loading() && filteredApplications().length > 0" class="overflow-x-auto">
        <table mat-table [dataSource]="pagedApplications()" class="w-full">

          <ng-container matColumnDef="customer">
            <th mat-header-cell *matHeaderCellDef class="!font-semibold !text-slate-600 !pl-6">Customer</th>
            <td mat-cell *matCellDef="let app" class="!pl-6">
              <div>
                <p class="font-semibold text-navy-900 text-sm">{{ app.customerName }}</p>
                <p class="text-xs text-slate-400">{{ app.customerEmail }}</p>
              </div>
            </td>
          </ng-container>

          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef class="!font-semibold !text-slate-600">Type</th>
            <td mat-cell *matCellDef="let app">
              <span class="text-sm font-medium text-navy-800">{{ app.type }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef class="!font-semibold !text-slate-600">Amount</th>
            <td mat-cell *matCellDef="let app">
              <span class="font-bold text-navy-700">{{ formatCurrency(app.amount) }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef class="!font-semibold !text-slate-600">Status</th>
            <td mat-cell *matCellDef="let app">
              <app-status-badge [status]="app.status"></app-status-badge>
            </td>
          </ng-container>

          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef class="!font-semibold !text-slate-600">Applied</th>
            <td mat-cell *matCellDef="let app" class="text-slate-500 text-sm">
              {{ app.createdAt | date:'MMM d, y' }}
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="!pr-6"></th>
            <td mat-cell *matCellDef="let app" class="!pr-6">
              <a [routerLink]="['/banker/applications', app.id]" mat-icon-button matTooltip="Review application">
                <mat-icon class="text-slate-500">chevron_right</mat-icon>
              </a>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns" class="bg-slate-50"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
              class="hover:bg-slate-50 cursor-pointer transition-colors"
              [routerLink]="['/banker/applications', row.id]"></tr>
        </table>

        <!-- Paginator -->
        <mat-paginator
          [length]="filteredApplications().length"
          [pageSize]="pageSize()"
          [pageIndex]="pageIndex()"
          [pageSizeOptions]="[10, 25, 50]"
          (page)="onPageChange($event)"
          class="border-t border-slate-100">
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
