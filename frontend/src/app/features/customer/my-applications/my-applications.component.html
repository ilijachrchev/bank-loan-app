<div class="page-enter p-8 max-w-7xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">My Applications</h1>
      <p class="text-slate-500 mt-1 text-sm">Track and manage all your loan applications</p>
    </div>
    <a routerLink="/customer/apply" mat-raised-button
       class="!rounded-xl !font-semibold !px-5"
       style="background: #0F172A !important; color: white !important">
      <mat-icon class="mr-1">add</mat-icon> Apply New
    </a>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mb-6">
    <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Search applications</mat-label>
        <input matInput [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)"
               placeholder="Search by type or purpose...">
        <mat-icon matSuffix class="text-slate-400">search</mat-icon>
      </mat-form-field>

      <div class="flex flex-wrap gap-2">
        <button *ngFor="let filter of statusFilters"
                (click)="selectedStatus.set(filter.value)"
                class="px-4 py-2 rounded-xl text-sm font-semibold transition-all border"
                [style.background]="selectedStatus() === filter.value ? '#0F172A' : 'transparent'"
                [style.color]="selectedStatus() === filter.value ? 'white' : '#64748b'"
                [style.borderColor]="selectedStatus() === filter.value ? '#0F172A' : '#e2e8f0'">
          {{ filter.label }}
        </button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">

    <div *ngIf="loading()" class="p-6">
      <app-loading-skeleton [count]="5"></app-loading-skeleton>
    </div>

    <app-empty-state
      *ngIf="!loading() && filteredApplications().length === 0"
      icon="📋"
      title="No applications found"
      [message]="applications().length === 0 ? 'You have not applied for any loans yet.' : 'No applications match your current filters.'"
      actionLabel="Apply for a Loan"
      actionLink="/customer/apply">
    </app-empty-state>

    <div *ngIf="!loading() && filteredApplications().length > 0" class="overflow-x-auto">
      <table mat-table [dataSource]="filteredApplications()" class="w-full">

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef class="!pl-6">Type</th>
          <td mat-cell *matCellDef="let app" class="!pl-6">
            <span class="font-semibold text-slate-800 text-sm">{{ app.type }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Amount</th>
          <td mat-cell *matCellDef="let app">
            <span class="font-bold text-slate-900">{{ formatCurrency(app.amount) }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="purpose">
          <th mat-header-cell *matHeaderCellDef>Purpose</th>
          <td mat-cell *matCellDef="let app">
            <span class="text-slate-500 text-sm line-clamp-1 max-w-xs">{{ app.purpose }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let app">
            <app-status-badge [status]="app.status"></app-status-badge>
          </td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Applied</th>
          <td mat-cell *matCellDef="let app" class="text-slate-500 text-sm">
            {{ app.createdAt | date:'MMM d, y' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="!pr-6"></th>
          <td mat-cell *matCellDef="let app" class="!pr-6">
            <a [routerLink]="['/customer/applications', app.id]" mat-icon-button>
              <mat-icon class="text-slate-400">chevron_right</mat-icon>
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            class="cursor-pointer"
            [routerLink]="['/customer/applications', row.id]"></tr>
      </table>
    </div>
  </div>
</div>
